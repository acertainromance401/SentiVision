name: AWS ECS Deploy

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - docker/**
      - infra/aws/task-definition.json
      - .github/workflows/aws-ecs-deploy.yml
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: sentivision
  ECS_CLUSTER: sentivision-cluster
  ECS_SERVICE: sentivision-service
  ECS_TASK_DEFINITION: infra/aws/task-definition.json
  CONTAINER_NAME: sentivision

jobs:
  deploy:
    name: Build and deploy to ECS Fargate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Render ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: External health check
        env:
          HEALTHCHECK_URL: ${{ secrets.ECS_HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "ECS_HEALTHCHECK_URL is not set. Skipping external health check."
            exit 0
          fi

          curl -fsS "$HEALTHCHECK_URL/health"

      - name: Ensure CloudWatch alarms
        run: |
          aws cloudwatch put-metric-alarm \
            --alarm-name "sentivision-ecs-high-cpu" \
            --alarm-description "ECS service CPU utilization is high" \
            --namespace AWS/ECS \
            --metric-name CPUUtilization \
            --statistic Average \
            --period 60 \
            --evaluation-periods 5 \
            --threshold 80 \
            --comparison-operator GreaterThanThreshold \
            --dimensions Name=ClusterName,Value=$ECS_CLUSTER Name=ServiceName,Value=$ECS_SERVICE \
            --treat-missing-data notBreaching

          aws cloudwatch put-metric-alarm \
            --alarm-name "sentivision-ecs-high-memory" \
            --alarm-description "ECS service memory utilization is high" \
            --namespace AWS/ECS \
            --metric-name MemoryUtilization \
            --statistic Average \
            --period 60 \
            --evaluation-periods 5 \
            --threshold 80 \
            --comparison-operator GreaterThanThreshold \
            --dimensions Name=ClusterName,Value=$ECS_CLUSTER Name=ServiceName,Value=$ECS_SERVICE \
            --treat-missing-data notBreaching
