name: DORA Lead Time

on:
  pull_request:
    types: [closed]

permissions:
  pull-requests: read
  contents: read

jobs:
  lead-time:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Calculate lead time from PR open to merge
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const created = new Date(pr.created_at);
            const merged = new Date(pr.merged_at);
            const leadMs = merged - created;
            const leadHours = (leadMs / (1000 * 60 * 60)).toFixed(2);

            core.summary
              .addHeading('DORA: Lead Time for Changes')
              .addTable([
                [{data: 'PR', header: true}, {data: '#'+pr.number, header: false}],
                [{data: 'Created', header: true}, {data: pr.created_at, header: false}],
                [{data: 'Merged', header: true}, {data: pr.merged_at, header: false}],
                [{data: 'Lead Time (hours)', header: true}, {data: leadHours, header: false}],
              ])
              .addRaw('\nTip: Shorter lead time usually means faster delivery feedback loops.\n')
              .write();
