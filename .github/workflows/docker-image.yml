name: Docker Build and Push

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - docker/**
      - .github/workflows/docker-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  verify-image:
    name: Build image and verify container health
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build local test image
        run: docker build -t sentivision:ci-test .

      - name: Run container
        run: |
          docker run -d --name sentivision-ci -p 18080:8080 sentivision:ci-test

      - name: Verify health endpoint
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS http://127.0.0.1:18080/health; then
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed"
          docker logs sentivision-ci || true
          exit 1

      - name: Cleanup
        if: always()
        run: |
          docker rm -f sentivision-ci || true

  build-and-push:
    name: Build and push image to GHCR
    needs: verify-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sentivision
          tags: |
            type=raw,value=latest
            type=sha

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}