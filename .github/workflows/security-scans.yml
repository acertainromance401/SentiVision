name: Security Scans

on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/security-scans.yml

permissions:
  contents: read
  issues: write

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          set +e
          npm audit --json > npm-audit.json
          npm_audit_exit=$?
          echo "NPM_AUDIT_EXIT_CODE=$npm_audit_exit" >> "$GITHUB_ENV"
          exit 0

      - name: Summarize npm audit
        run: |
          node -e '
          const fs = require("fs");
          const p = "npm-audit.json";
          const out = "npm-audit-summary.md";
          const raw = fs.readFileSync(p, "utf8");
          const data = JSON.parse(raw);
          const v = (data.metadata && data.metadata.vulnerabilities) || {};
          const summary = [
            "## npm audit",
            "",
            `- exit_code: ${process.env.NPM_AUDIT_EXIT_CODE || "0"}`,
            `- total: ${(v.total ?? 0)}`,
            `- critical: ${(v.critical ?? 0)}`,
            `- high: ${(v.high ?? 0)}`,
            `- moderate: ${(v.moderate ?? 0)}`,
            `- low: ${(v.low ?? 0)}`,
            ""
          ].join("\\n");
          fs.writeFileSync(out, summary);
          '

      - name: Upload npm audit artifacts
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-report
          path: |
            npm-audit.json
            npm-audit-summary.md

  snyk-scan:
    name: Snyk scan
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk test or create skip report
        run: |
          if [ -n "$SNYK_TOKEN" ]; then
            npx snyk auth "$SNYK_TOKEN"
            npx snyk test --json-file-output=snyk-report.json || true
          else
            cat > snyk-report.json << 'EOF'
            {
              "status": "skipped",
              "reason": "SNYK_TOKEN is not configured"
            }
            EOF
          fi

      - name: Summarize Snyk result
        run: |
          node -e '
          const fs = require("fs");
          const p = "snyk-report.json";
          const out = "snyk-summary.md";
          const raw = fs.readFileSync(p, "utf8");
          const data = JSON.parse(raw);

          let summary = ["## Snyk", ""]; 
          if (data.status === "skipped") {
            summary.push(`- status: ${data.status}`);
            summary.push(`- reason: ${data.reason}`);
          } else {
            const vulns = Array.isArray(data.vulnerabilities) ? data.vulnerabilities : [];
            const critical = vulns.filter(v => v.severity === "critical").length;
            const high = vulns.filter(v => v.severity === "high").length;
            const medium = vulns.filter(v => v.severity === "medium").length;
            const low = vulns.filter(v => v.severity === "low").length;
            summary.push(`- status: completed`);
            summary.push(`- total: ${vulns.length}`);
            summary.push(`- critical: ${critical}`);
            summary.push(`- high: ${high}`);
            summary.push(`- medium: ${medium}`);
            summary.push(`- low: ${low}`);
          }
          summary.push("");
          fs.writeFileSync(out, summary.join("\\n"));
          '

      - name: Upload Snyk artifacts
        uses: actions/upload-artifact@v7
        with:
          name: snyk-report
          path: |
            snyk-report.json
            snyk-summary.md

  report:
    name: Publish security report
    needs: [npm-audit, snyk-scan]
    runs-on: ubuntu-latest

    steps:
      - name: Download npm audit artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-audit-report
          path: reports

      - name: Download Snyk artifact
        uses: actions/download-artifact@v8
        with:
          name: snyk-report
          path: reports

      - name: Build combined markdown report
        run: |
          {
            echo "# Automated Security Scan Report"
            echo
            echo "Generated at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo
            cat reports/npm-audit-summary.md
            echo
            cat reports/snyk-summary.md
          } > reports/security-scan-report.md

      - name: Upload combined report artifact
        uses: actions/upload-artifact@v7
        with:
          name: security-scan-report
          path: reports/security-scan-report.md

      - name: Create or update tracking issue
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('reports/security-scan-report.md', 'utf8');
            const title = 'Automated Security Scan Report';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'security-scan',
              per_page: 100
            });

            const existing = issues.data.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['security-scan']
              });
            }