name: Build Test Deploy Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect_changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      ci_required: ${{ steps.filter.outputs.ci }}
      deploy_required: ${{ steps.filter.outputs.deploy }}
      docs_only: ${{ steps.filter.outputs.docs_only }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ci:
              - 'src/**'
              - 'tests/**'
              - '.github/actions/**'
              - '.github/workflows/**'
              - 'requirements-ci.txt'
            deploy:
              - 'src/api/**'
              - 'src/model/**'
              - 'src/data/**'
              - 'docker-compose.yml'
              - 'prometheus.yml'
            docs_only:
              - 'docs/**'
              - '**/*.md'

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.ci_required == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: ./.github/actions/python-ci-setup
        with:
          python-version: "3.12"
          use-cache: true
          requirements-file: requirements-ci.txt

      - name: Build validation (compile)
        run: |
          python -m compileall src

      - name: Create build artifact
        run: |
          items=()
          for p in src tests docs README.md CONTRIBUTING.md CODE_OF_CONDUCT.md LICENSE; do
            if [[ -e "$p" ]]; then
              items+=("$p")
            fi
          done

          if [[ ${#items[@]} -eq 0 ]]; then
            echo "No build inputs found"
            exit 1
          fi

          tar -czf sentivision-build.tar.gz "${items[@]}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentivision-build
          path: sentivision-build.tar.gz
          if-no-files-found: error

  test:
    name: Test artifact
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: ./.github/actions/python-ci-setup
        with:
          python-version: "3.12"
          use-cache: true
          requirements-file: requirements-ci.txt

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sentivision-build

      - name: Validate artifact and run tests
        run: |
          tar -xzf sentivision-build.tar.gz
          pytest -q tests/test_smoke.py --junitxml=test-report.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: btd-test-report
          path: test-report.xml
          if-no-files-found: error

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [detect_changes, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect_changes.outputs.deploy_required == 'true'
    environment:
      name: production
    env:
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sentivision-build

      - name: Deploy via webhook when secret exists
        if: env.DEPLOY_WEBHOOK_URL != ''
        run: |
          curl -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"service":"SentiVision","event":"deploy","source":"github-actions"}'

      - name: Skip deploy if secret missing
        if: env.DEPLOY_WEBHOOK_URL == ''
        run: |
          echo "DEPLOY_WEBHOOK_URL is not configured. Deploy step skipped safely."

  preview_deploy_plan:
    name: Preview deploy plan on PR
    runs-on: ubuntu-latest
    needs: detect_changes
    if: github.event_name == 'pull_request' && needs.detect_changes.outputs.deploy_required == 'true'

    steps:
      - name: Show deploy preview
        run: |
          echo "Deploy-related files changed in PR."
          echo "Actual deploy runs only on push to main."

  skip_notice:
    name: Skip notice
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.ci_required != 'true' && github.event_name != 'workflow_dispatch'

    steps:
      - name: Explain skip reason
        run: |
          echo "No CI-impacting files changed. Build/Test/Deploy skipped."
