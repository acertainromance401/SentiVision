name: JS Unit Test Coverage

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - __tests__/**
      - package.json
      - package-lock.json
      - jest.config.cjs
      - index.js
      - .github/workflows/js-tests.yml
  pull_request:
    branches:
      - main
    paths:
      - src/**
      - __tests__/**
      - package.json
      - package-lock.json
      - jest.config.cjs
      - index.js
      - .github/workflows/js-tests.yml

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage gate
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage
          path: coverage
