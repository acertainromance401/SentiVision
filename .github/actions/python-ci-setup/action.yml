name: Python CI Setup

description: Setup Python and install dependencies with optional pip cache.

inputs:
  python-version:
    description: Python version to install
    required: true
  use-cache:
    description: Whether to enable pip cache
    required: false
    default: "true"
  requirements-file:
    description: Requirements file path
    required: false
    default: requirements-ci.txt

runs:
  using: composite
  steps:
    - name: Setup Python with cache
      if: inputs.use-cache == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: ${{ inputs.requirements-file }}

    - name: Setup Python without cache
      if: inputs.use-cache != 'true'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r "${{ inputs.requirements-file }}"
